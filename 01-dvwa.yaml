apiVersion: v1
kind: Namespace
metadata:
  name: security-lab
  labels:
    name: security-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvwa
  namespace: security-lab
  labels:
    app: victim
    scenario: "chain"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dvwa
  template:
    metadata:
      labels:
        app: dvwa
        app.kubernetes.io/name: dvwa
        scenario: "04"
    spec:
      containers:
        - name: dvwa
          image: vulnerables/web-dvwa
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dvwa
  namespace: security-lab
spec:
  type: NodePort
  selector:
    app: dvwa
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
